name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - '*/Dockerfile'
      - '**/Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image directory to build (e.g. sandbox). Leave empty to build all changed.'
        required: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed images
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.image }}" ]; then
            # Manual trigger: build specified image
            echo "matrix=[\"${{ github.event.inputs.image }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Auto-detect changed Dockerfiles
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*/Dockerfile' | xargs -I{} dirname {} | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
              # If no Dockerfiles changed (e.g. workflow file changed), build all
              CHANGED=$(find . -name Dockerfile -maxdepth 2 | xargs -I{} dirname {} | sed 's|^\./||' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
            echo "matrix=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            rockchin/${{ matrix.image }}:latest
            rockchin/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
